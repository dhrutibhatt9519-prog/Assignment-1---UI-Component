<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1 - UI Component</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #333;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .nav-links a {
            color: #fff;
            font-size: 16px;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover, .logo a:hover {
            color: #00bcd4;
        }
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        .card-section {
            padding: 40px;
        }
        #cardContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
            justify-content: center;
            justify-items: center;
        }
        .project-card {
            display: grid;
            max-width: 320px;
            grid-template-rows: auto 1fr;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .card-image {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 767px) {
            .card-image {
                height: 250px;
            }
        }
        @media (max-width: 568px) {
            .card-image {
                height: 200px;
            }
        }
        @media (max-width: 480px) {
            #cardContainer {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
            .card-image {
                height: 170px;
            }
        }
        @media (max-width: 360px) {
            #cardContainer {
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            }
        }
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #00bcd4;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
        }
        .card-content {
            padding: 20px;
            display: grid;
            gap: 10px;
        }
        .card-content h3 {
            font-size: 20px;
            color: #333;
        }
        .card-content p {
            font-size: 16px;
            color: #666;
        }
        .btn {
            margin-top: auto;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background: #333;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            text-align: center;
        }
        .btn:hover {
            background: #00bcd4;
        }
        .contact-section {
            padding: 40px;
            max-width: 600px;
            margin: auto;
        }
        .contact-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 30px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #333;
        }
        input[type="text"], input[type="email"], select, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            display: block;
            color: #333;
            font-size: 14px;
            width: 100%;
            margin-bottom: 20px;
        }
        input[type="text"]:focus, input[type="email"]:focus, select:focus, textarea:focus {
            border-color: #00bcd4;
            box-shadow: 0 0 5px rgba(0,188,212,0.5);
        }
        input[type="submit"] {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #00bcd4;
        }
        #noResults {
            text-align: center;
            display:none; 
            color:red; 
            margin-top:10px;
        }
    </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="##" class="logo">Logo</a>
      <ul class="nav-links">
        <li><a href="##">Home</a></li>
        <li><a href="##">Projects</a></li>
        <li><a href="##">About</a></li>
        <li><a href="##">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="card-section">
        <input type="text" id="searchInput" placeholder="Search projects..." />
        <p id="noResults">
          No projects found.
        </p>
        <div id="cardContainer"></div>
    </section>
    <section class="contact-section">
      <h2>Contact Us</h2>
      <form class="contact-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required />
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="john.doe@example.com" required />
          <label for="subject">Subject</label>
          <select id="subject" name="subject" required>
            <option value="" hidden>Select a subject</option>
            <option value="design">Web Design</option>
            <option value="development">Development</option>
            <option value="general">General Inquiry</option>
          </select>
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message here..." required></textarea>
          <input type="submit" value="Submit">
      </form>
    </section>
  </main>
  <script>
    const projects = [
    {
        title: "Portfolio Website 1",
        description: "A clean and responsive portfolio website showcasing creative projects.",
        category: "Web Design",
        image: "nylas-banner-img.jpg",
        link: "#"
    },
    {
        title: "Portfolio Website 2",
        description: "A sleek shopping experience with modern UI patterns.",
        category: "UI/UX",
        image: "IMG_6639.JPG",
        link: "#"
    },
    {
        title: "Portfolio Website 3",
        description: "Analytics dashboard with data visualization.",
        category: "Web App",
        image: "nylas-banner-img.jpg",
        link: "#"
    },
    {
        title: "Portfolio Website 4",
        description: "A clean and responsive portfolio website showcasing creative projects.",
        category: "Web Design",
        image: "IMG_6639.JPG",
        link: "#"
    },
    {
        title: "Portfolio Website 5",
        description: "A sleek shopping experience with modern UI patterns.",
        category: "UI/UX",
        image: "nylas-banner-img.jpg",
        link: "#"
    }
    ];
    const container = document.querySelector("#cardContainer");
    const searchInput = document.querySelector("#searchInput");
    const noResults = document.querySelector("#noResults");

    function renderProjects(projectList) {
      container.innerHTML = "";

      if (projectList.length === 0) {
        noResults.style.display = "block";
        return;
      } else {
        noResults.style.display = "none";
      }

      let cardsHTML = "";
      projectList.forEach(project => {
        cardsHTML += `
          <article class="project-card">
              <div class="card-image">
                  <img src="${project.image}" alt="${project.title}" />
                  <p class="badge">${project.category}</p>
              </div>
              <div class="card-content">
                  <h3>${project.title}</h3>
                  <p>${project.description}</p>
                  <a href="${project.link}" class="btn">View Project</a>
              </div>
          </article>
        `;
      });
    container.innerHTML = cardsHTML;
    }

    renderProjects(projects);

    searchInput.addEventListener("input", (e) => {
      const searchTerm = e.target.value.toLowerCase().trim();
    
      const filteredProjects = projects.filter(project =>
        project.title.toLowerCase().includes(searchTerm) ||
        project.category.toLowerCase().includes(searchTerm) ||
        project.description.toLowerCase().includes(searchTerm)
      );
    
      renderProjects(filteredProjects);
    });
      searchInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") {
        searchInput.dispatchEvent(new Event("input"));
      }
    });
  </script>
</body>
</html>
